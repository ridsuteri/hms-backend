<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="/app.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="shell topbar-inner">
            <a class="brand" href="/admin-dashboard/admindashboard.html">Admin dashboard</a>
            <nav class="nav">
                <a href="/admin-dashboard/admindashboard.html" class="active">Doctors</a>
                <a href="/admin-dashboard/allBookingpage.html">Bookings</a>
                <a href="/">Patient home</a>
            </nav>
        </div>
    </header>

    <main class="shell page">
        <section class="page-header">
            <div>
                <span class="eyebrow">Doctor management</span>
                <h1>Doctors</h1>
                <p class="helper">Add doctors, review the current list, and remove entries when needed.</p>
            </div>
            <div class="actions">
                <a class="button" href="/admin-dashboard/adminadddoctorform.html">Add doctor</a>
                <a class="button-secondary" href="/admin-dashboard/allBookingpage.html">Open bookings</a>
                <button id="logoutButton" class="button-ghost" type="button">Sign out</button>
            </div>
        </section>

        <div id="message" class="message" hidden></div>

        <section class="panel">
            <div class="section-header">
                <h2 id="doctorCount">Loading doctors...</h2>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Specialty</th>
                            <th>Availability</th>
                            <th>Contact</th>
                            <th>Email</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="doctorRows"></tbody>
                </table>
            </div>
        </section>
    </main>

</body>
</html>

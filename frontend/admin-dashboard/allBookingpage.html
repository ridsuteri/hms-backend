<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/app.js"></script>
</head>
<body data-page="adminBookings">
    <header class="topbar">
        <div class="shell topbar-inner">
            <a class="brand" href="/admin-dashboard/admindashboard.html">Admin dashboard</a>
            <nav class="nav">
                <a href="/admin-dashboard/admindashboard.html">Doctors</a>
                <a class="active" href="/admin-dashboard/allBookingpage.html">Bookings</a>
                <a href="/">Patient home</a>
            </nav>
        </div>
    </header>

    <main class="shell page">
        <section class="page-header">
            <div>
                <span class="eyebrow">Appointment review</span>
                <h1>All bookings</h1>
                <p class="helper">Review requests and update their current status.</p>
            </div>
            <div class="actions">
                <a class="button-secondary" href="/admin-dashboard/admindashboard.html">Back to doctors</a>
                <button id="logoutButton" class="button-ghost" type="button">Sign out</button>
            </div>
        </section>

        <div id="message" class="message" hidden></div>

        <section class="panel">
            <h2>Status overview</h2>
            <div class="metrics">
                <div class="metric">
                    <span class="helper">Pending</span>
                    <strong id="pendingCount">0</strong>
                </div>
                <div class="metric">
                    <span class="helper">Accepted</span>
                    <strong id="acceptedCount">0</strong>
                </div>
                <div class="metric">
                    <span class="helper">Rejected</span>
                    <strong id="rejectedCount">0</strong>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-header">
                <h2 id="bookingCount">Loading bookings...</h2>
            </div>
            <div id="bookingList" class="list-stack"></div>
        </section>
    </main>
</body>
</html>
